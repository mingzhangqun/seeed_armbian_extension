name: Build and Publish APT Repository

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Source branch/tag for package sources'
        required: false
        default: 'deb_source'
      sdk_debs_release:
        description: 'Release tag containing SDK deb packages (leave empty to skip)'
        required: false
        default: 'rockchip-sdk-debs'
      build_kernel:
        description: 'Trigger kernel build after publish'
        required: false
        type: boolean
        default: true
      kernel_rk3576:
        description: 'Build kernel for recomputer-rk3576-devkit'
        required: false
        type: boolean
        default: true
      kernel_rk3588:
        description: 'Build kernel for recomputer-rk3588-devkit'
        required: false
        type: boolean
        default: true

  push:
    branches: [deb_source]

jobs:
  # ──────────────────────────────────────────────────
  # Build all packages on Debian Bookworm (oldest supported).
  # Binaries are forward-compatible with newer distros (trixie, noble, etc.)
  # ──────────────────────────────────────────────────
  build-debs:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:bookworm
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fcs960k-aic-bluez
            source_dir: FCS960K-aic-bluz
            build_deps: >-
              autoconf automake libtool pkg-config flex bison
              libglib2.0-dev libdbus-1-dev libreadline-dev
              libncurses-dev libffi-dev zlib1g-dev
              libgettextpo-dev libexpat-dev libudev-dev libical-dev
              libjson-c-dev libelf-dev python3-docutils
            build_cmd: DEB_BUILD_OPTIONS="noddebs" dpkg-buildpackage -us -uc -b

          - name: hostapd-morse-tools
            source_dir: hostapd_morse_tools
            build_deps: libnl-3-dev libnl-genl-3-dev libnl-route-3-dev libssl-dev libdbus-1-dev
            build_cmd: make deb

          - name: morsectrl-tools
            source_dir: morsectrl_tools
            build_deps: quilt pkg-config libnl-3-dev libnl-genl-3-dev libnl-route-3-dev gcc-aarch64-linux-gnu
            build_cmd: DEB_BUILD_OPTIONS="noddebs" dpkg-buildpackage -us -uc -b

          - name: wpa-supplicant-morse-tools
            source_dir: wpa_supplicant_morese_tools
            build_deps: libnl-3-dev libnl-genl-3-dev libnl-route-3-dev libssl-dev libdbus-1-dev
            build_cmd: make deb

          - name: morse-fgh100m-dkms
            source_dir: morse-fgh100m-dkms
            build_deps: dh-sequence-dkms
            build_cmd: DEB_BUILD_OPTIONS="noddebs" dpkg-buildpackage -us -uc -b

          - name: realtek-r8125-dkms
            source_dir: realtek-r8125-dkms
            build_deps: dh-sequence-dkms
            build_cmd: DEB_BUILD_OPTIONS="noddebs" dpkg-buildpackage -us -uc -b

          - name: usbdevice-gadget
            source_dir: rk35xx_usb_gadget
            build_deps: ''
            build_cmd: bash build-usbdevice-deb.sh

          # camera-engine-rkaiq-rk3576 and camera-engine-rkaiq-rk3588 are
          # distributed as prebuilt binaries (closed-source 3A algorithm .a
          # files). See prebuilt/ on the deb_source branch.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref || 'deb_source' }}

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential devscripts debhelper \
            dpkg-dev fakeroot ${{ matrix.build_deps }}

      - name: Build ${{ matrix.name }}
        shell: bash
        working-directory: ${{ matrix.source_dir }}
        run: |
          set -euo pipefail
          ${{ matrix.build_cmd }}
          mkdir -p /tmp/debs
          find .. -maxdepth 1 -name '*.deb' ! -name 'Makefile.deb' -exec cp {} /tmp/debs/ \;
          find . -name '*.deb' ! -name 'Makefile.deb' -exec cp {} /tmp/debs/ \;
          echo "Built packages:"
          ls -lh /tmp/debs/*.deb

      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.name }}
          path: /tmp/debs/*.deb

  # ──────────────────────────────────────────────────
  # Publish APT repository (aptly + GitHub Pages)
  # Single set of debs published to both stable and bookworm dists.
  # ──────────────────────────────────────────────────
  publish-apt:
    needs: [build-debs]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/debs
          pattern: debs-*
          merge-multiple: true

      - name: Checkout prebuilt debs
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref || 'deb_source' }}
          sparse-checkout: prebuilt
          path: deb-source

      - name: Merge prebuilt debs
        run: |
          if [[ -d deb-source/prebuilt ]]; then
            copied=$(find deb-source/prebuilt -name '*.deb' | wc -l)
            cp -vn deb-source/prebuilt/*.deb /tmp/debs/ 2>/dev/null || true
            echo "Merged ${copied} prebuilt debs"
          else
            echo "No prebuilt directory found, skipping"
          fi

      - name: Download SDK debs from Release
        env:
          GH_TOKEN: ${{ github.token }}
          SDK_RELEASE_TAG: ${{ inputs.sdk_debs_release || 'rockchip-sdk-debs' }}
          REPO: ${{ github.repository }}
        run: |
          echo "=== Downloading SDK debs from Release: ${SDK_RELEASE_TAG} ==="
          TMPDIR=$(mktemp -d)
          gh release download "${SDK_RELEASE_TAG}" \
            --repo "${REPO}" \
            --dir "${TMPDIR}" \
            --pattern '*arm64*.tar.xz' \
            --clobber || { echo "WARNING: Release ${SDK_RELEASE_TAG} not found, skipping SDK debs"; exit 0; }
          echo "Extracting archives..."
          for archive in "${TMPDIR}"/*.tar.xz; do
            echo "  Extracting: $(basename "${archive}")"
            tar -xf "${archive}" -C "${TMPDIR}"
          done
          echo "Downloaded $(find "${TMPDIR}" -name '*.deb' | wc -l) SDK debs"
          EXCLUDE_PKGS=$(find /tmp/debs -name '*.deb' -exec basename {} \; | sed 's/_.*//' | sort -u)
          echo "CI-built packages (will exclude from SDK): ${EXCLUDE_PKGS}"
          # Manifest of SDK-sourced debs — used by generate-deb-index.sh to
          # classify them as "Rockchip SDK" regardless of package name.
          : > /tmp/sdk-debs.manifest
          copied=0; skipped=0; seen_pkgs=""
          while IFS= read -r deb; do
            pkg_name=$(basename "${deb}" | sed 's/_.*//')
            if echo "${EXCLUDE_PKGS}" | grep -qxF "${pkg_name}"; then
              echo "  SKIP (conflicts with CI build): $(basename "${deb}")"
              skipped=$((skipped + 1))
            elif echo "${seen_pkgs}" | grep -qxF "${pkg_name}"; then
              echo "  SKIP (duplicate in SDK): $(basename "${deb}")"
              skipped=$((skipped + 1))
            else
              cp -vn "${deb}" /tmp/debs/ && copied=$((copied + 1))
              basename "${deb}" >> /tmp/sdk-debs.manifest
              seen_pkgs="${seen_pkgs}${pkg_name}"$'\n'
            fi
          done < <(find "${TMPDIR}" -name '*.deb')
          echo "  Copied ${copied} SDK debs, skipped ${skipped} conflicting"
          echo "  Manifest: $(wc -l < /tmp/sdk-debs.manifest) entries in /tmp/sdk-debs.manifest"

      - name: Fix cross-distro dependencies
        run: |
          # Replace libgcc1 with libgcc-s1 (libgcc1 removed in trixie,
          # libgcc-s1 available in bookworm, trixie, noble).
          fixed=0
          for deb in /tmp/debs/*.deb; do
            [ -f "${deb}" ] || continue
            if dpkg-deb -f "${deb}" depends 2>/dev/null | grep -q 'libgcc1'; then
              echo "Fixing deps: $(basename "${deb}")"
              tmpdir=$(mktemp -d)
              dpkg-deb -R "${deb}" "${tmpdir}"
              sed -i 's/libgcc1 (>= 1:4.2)/libgcc-s1/g' "${tmpdir}/DEBIAN/control"
              dpkg-deb -b "${tmpdir}" "${deb}"
              rm -rf "${tmpdir}"
              fixed=$((fixed + 1))
            fi
          done
          echo "Fixed ${fixed} packages"

      - name: Download cached kernel debs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p /tmp/kernel-cache
          gh release download kernel-debs-cache \
            --repo "${REPO}" \
            --dir /tmp/kernel-cache \
            --clobber 2>/dev/null \
            || { echo "No kernel cache found, skipping kernel debs"; exit 0; }
          if [ -f /tmp/kernel-cache/kernel-debs.tar.xz ]; then
            tar -xf /tmp/kernel-cache/kernel-debs.tar.xz -C /tmp/kernel-cache
            echo "=== Cached kernel debs ==="
            find /tmp/kernel-cache -name '*.deb' -exec basename {} \;
            cp -v /tmp/kernel-cache/*.deb /tmp/debs/
            echo "Added $(find /tmp/kernel-cache -name '*.deb' | wc -l) cached kernel debs"
          fi

      - name: List all debs (final)
        run: |
          echo "=== Final .deb list ==="
          find /tmp/debs -name '*.deb' -exec basename {} \; | sort
          echo "Total: $(find /tmp/debs -name '*.deb' | wc -l)"

      - name: Install aptly
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly gnupg2

      - name: Import GPG key
        env:
          GPG_KEY_B64: ${{ secrets.ARMBIAN_APT_GPG_PRIVATE_KEY }}
        run: |
          echo "${GPG_KEY_B64}" | base64 -d | gpg --batch --import

      - name: Publish apt repository
        env:
          ARMBIAN_APT_GPG_KEY_ID: ${{ secrets.ARMBIAN_APT_GPG_KEY_ID }}
        run: |
          chmod +x scripts/*.sh
          scripts/publish-aptly.sh /tmp/debs

      - name: Generate deb index page
        run: |
          scripts/generate-deb-index.sh /tmp/debs public/index.html /tmp/sdk-debs.manifest

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Cache userspace debs for kernel workflow
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p /tmp/cache-out
          # Exclude kernel debs from userspace cache
          find /tmp/debs -name '*.deb' ! -name 'linux-image-*' ! -name 'linux-headers-*' ! -name 'linux-dtb-*' ! -name 'linux-source-*' ! -name 'linux-u-boot-*' \
            -exec cp {} /tmp/cache-out/ \;
          # Include the SDK manifest so kernel workflow can still classify
          # SDK debs as "Rockchip SDK" on its index page.
          [ -f /tmp/sdk-debs.manifest ] && cp /tmp/sdk-debs.manifest /tmp/cache-out/
          cd /tmp/cache-out && shopt -s nullglob; deb_files=(*.deb); if [ ${#deb_files[@]} -gt 0 ]; then
            tar -cf userspace-debs.tar.xz -I 'xz -9' *.deb sdk-debs.manifest 2>/dev/null || \
              tar -cf userspace-debs.tar.xz -I 'xz -9' *.deb
          fi
          cd /tmp/cache-out
          gh release create userspace-debs-cache userspace-debs.tar.xz \
            --repo "${REPO}" \
            --title "Userspace debs cache" \
            --notes "Latest userspace debs (auto-updated by CI)" \
          || gh release upload userspace-debs-cache userspace-debs.tar.xz \
            --repo "${REPO}" \
            --clobber

  # ──────────────────────────────────────────────────
  # Deploy to GitHub Pages
  # ──────────────────────────────────────────────────
  deploy-pages:
    needs: publish-apt
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      actions: write  # needed by the "Trigger kernel build" step (gh workflow run)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Trigger kernel build
        # Chain via `gh workflow run` instead of a reusable workflow_call job
        # — the latter causes startup_failure on this repo for a reason that
        # doesn't reproduce elsewhere. The kernel workflow's dispatch inputs
        # are build_rk3576/build_rk3588 booleans; map our checkboxes to them.
        if: ${{ inputs.build_kernel == true }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          KERNEL_RK3576: ${{ inputs.kernel_rk3576 }}
          KERNEL_RK3588: ${{ inputs.kernel_rk3588 }}
        run: |
          set -eu
          args=(--repo "${REPO}" --ref main)
          args+=(-f "build_rk3576=${KERNEL_RK3576:-false}")
          args+=(-f "build_rk3588=${KERNEL_RK3588:-false}")
          if [[ "${KERNEL_RK3576}" != 'true' && "${KERNEL_RK3588}" != 'true' ]]; then
            echo "::error::build_kernel=true but no board selected (enable kernel_rk3576 or kernel_rk3588)."
            exit 1
          fi
          gh workflow run kernel-build-publish.yml "${args[@]}"
          echo "Kernel workflow triggered (rk3576=${KERNEL_RK3576:-false}, rk3588=${KERNEL_RK3588:-false})."
