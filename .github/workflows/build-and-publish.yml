name: Build and Publish APT Repository

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Package sources branch/tag'
        required: false
        default: 'deb_source'
      armbian_build_ref:
        description: 'Seeed-Studio/armbian-build branch/tag'
        required: false
        default: 'main'
      build_rk3576:
        description: 'recomputer-rk3576-devkit'
        required: false
        type: boolean
        default: true
      build_rk3588:
        description: 'recomputer-rk3588-devkit'
        required: false
        type: boolean
        default: true

# ──────────────────────────────────────────────────
# Single workflow: userspace debs (ARM) and kernel +
# U-Boot debs (x86 cross-compile) build in parallel,
# then publish merges everything into one APT repo.
# No cross-workflow release cache, no chained trigger.
# ──────────────────────────────────────────────────

jobs:
  # ──────────────────────────────────────────────────
  # Build a JSON matrix of boards from the input flags.
  # On push (no inputs), both boards default to true.
  # ──────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      armbian_ref: ${{ steps.gen.outputs.armbian_ref }}
    steps:
      - name: Generate matrix
        id: gen
        env:
          INPUT_RK3576: ${{ inputs.build_rk3576 || 'true' }}
          INPUT_RK3588: ${{ inputs.build_rk3588 || 'true' }}
          INPUT_REF: ${{ inputs.armbian_build_ref || 'main' }}
        run: |
          set -eu
          boards=()
          [[ "${INPUT_RK3576}" == 'true' ]] && boards+=('recomputer-rk3576-devkit')
          [[ "${INPUT_RK3588}" == 'true' ]] && boards+=('recomputer-rk3588-devkit')
          if [ ${#boards[@]} -eq 0 ]; then
            echo "::error::No boards selected (enable build_rk3576 or build_rk3588)."
            exit 1
          fi
          for b in "${boards[@]}"; do
            if [[ ! "$b" =~ ^[a-zA-Z0-9][a-zA-Z0-9._-]*$ ]]; then
              echo "::error::Invalid board name: '$b'"
              exit 1
            fi
          done
          matrix=$(printf '%s\n' "${boards[@]}" | jq -Rc '{board: .}' | jq -sc '.')
          {
            echo "matrix<<EOF"
            echo "${matrix}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          # Ref validation: chars in [A-Za-z0-9._-/] (branch/tag names)
          if [[ ! "${INPUT_REF}" =~ ^[A-Za-z0-9][A-Za-z0-9._/-]*$ ]]; then
            echo "::error::Invalid armbian_build_ref: '${INPUT_REF}'"
            exit 1
          fi
          # Existence check: warn (don't fail) if ref not found, fall back to main.
          LSREMOTE=$(git ls-remote "https://github.com/Seeed-Studio/armbian-build.git" "${INPUT_REF}" 2>/dev/null || true)
          if [[ -n "${LSREMOTE}" ]]; then
            RESOLVED="${INPUT_REF}"
          else
            RESOLVED="main"
            echo "::warning::Ref '${INPUT_REF}' not found in Seeed-Studio/armbian-build, using 'main'."
          fi
          echo "armbian_ref=${RESOLVED}" >> "$GITHUB_OUTPUT"
          echo "Selected boards: ${boards[*]}"
          echo "armbian-build ref: ${RESOLVED}"

  # ──────────────────────────────────────────────────
  # Build all userspace packages on Debian Bookworm (oldest supported).
  # Binaries are forward-compatible with newer distros (trixie, noble, etc.)
  # ──────────────────────────────────────────────────
  build-userspace:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:bookworm
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fcs960k-aic-bluez
            source_dir: FCS960K-aic-bluz
            build_deps: >-
              autoconf automake libtool pkg-config flex bison
              libglib2.0-dev libdbus-1-dev libreadline-dev
              libncurses-dev libffi-dev zlib1g-dev
              libgettextpo-dev libexpat-dev libudev-dev libical-dev
              libjson-c-dev libelf-dev python3-docutils
            build_cmd: DEB_BUILD_OPTIONS="noddebs" dpkg-buildpackage -us -uc -b

          - name: hostapd-morse-tools
            source_dir: hostapd_morse_tools
            build_deps: libnl-3-dev libnl-genl-3-dev libnl-route-3-dev libssl-dev libdbus-1-dev
            build_cmd: make deb

          - name: morsectrl-tools
            source_dir: morsectrl_tools
            build_deps: quilt pkg-config libnl-3-dev libnl-genl-3-dev libnl-route-3-dev gcc-aarch64-linux-gnu
            build_cmd: DEB_BUILD_OPTIONS="noddebs" dpkg-buildpackage -us -uc -b

          - name: wpa-supplicant-morse-tools
            source_dir: wpa_supplicant_morese_tools
            build_deps: libnl-3-dev libnl-genl-3-dev libnl-route-3-dev libssl-dev libdbus-1-dev
            build_cmd: make deb

          - name: morse-fgh100m-dkms
            source_dir: morse-fgh100m-dkms
            build_deps: dh-sequence-dkms
            build_cmd: DEB_BUILD_OPTIONS="noddebs" dpkg-buildpackage -us -uc -b

          - name: realtek-r8125-dkms
            source_dir: realtek-r8125-dkms
            build_deps: dh-sequence-dkms
            build_cmd: DEB_BUILD_OPTIONS="noddebs" dpkg-buildpackage -us -uc -b

          - name: usbdevice-gadget
            source_dir: rk35xx_usb_gadget
            build_deps: ''
            build_cmd: bash build-usbdevice-deb.sh

          # camera-engine-rkaiq-rk3576 and camera-engine-rkaiq-rk3588 are
          # distributed as prebuilt binaries (closed-source 3A algorithm .a
          # files). See prebuilt/ on the deb_source branch.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref || 'deb_source' }}

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential devscripts debhelper \
            dpkg-dev fakeroot ${{ matrix.build_deps }}

      - name: Build ${{ matrix.name }}
        shell: bash
        working-directory: ${{ matrix.source_dir }}
        run: |
          set -euo pipefail
          ${{ matrix.build_cmd }}
          mkdir -p /tmp/debs
          find .. -maxdepth 1 -name '*.deb' ! -name 'Makefile.deb' -exec cp {} /tmp/debs/ \;
          find . -name '*.deb' ! -name 'Makefile.deb' -exec cp {} /tmp/debs/ \;
          echo "Built packages:"
          ls -lh /tmp/debs/*.deb

      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.name }}
          path: /tmp/debs/*.deb

  # ──────────────────────────────────────────────────
  # Per-board matrix build: kernel + U-Boot (x86 cross-compile)
  # via scripts/build.sh (wraps armbian-build's compile.sh, sets
  # ENABLE_SEEED_RK_EXTENSION, RK_COMPILE_USBPLUG, cache
  # invalidation, etc.)
  # Output: armbian-build/output/debs/*.deb
  # ──────────────────────────────────────────────────
  build-kernel:
    needs: prepare
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        value: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout (for scripts/build.sh and extension)
        uses: actions/checkout@v4

      - name: Resolve board
        id: board
        env:
          MATRIX_BOARD: ${{ matrix.value.board }}
        run: |
          echo "name=${MATRIX_BOARD}" >> "$GITHUB_OUTPUT"
          echo "Resolved board: ${MATRIX_BOARD}"

      - name: Checkout armbian-build
        uses: actions/checkout@v4
        with:
          repository: Seeed-Studio/armbian-build
          ref: ${{ needs.prepare.outputs.armbian_ref }}
          path: armbian-build
          fetch-depth: 1

      - name: Stage build.sh and install extension
        run: |
          EXT_DIR="$PWD"
          mkdir -p armbian-build/userpatches/extensions
          # armbian-build's extension search uses `find -type f` (no -L),
          # which doesn't follow symlinks — a symlinked extension reads as
          # 0 files and the framework falls back to fetching
          # Seeed-Studio/seeed_armbian_extension from GitHub (which lacks
          # the maskrom SPL hooks). Copy the repo instead so the local
          # fork version wins.
          rsync -a --exclude='.git' --exclude='.claude' --exclude='.omc' \
            --exclude='.codegraph' --exclude='armbian-build' \
            --exclude='*.w' --exclude='*.m' --exclude='*.bak' \
            "${EXT_DIR}/" armbian-build/userpatches/extensions/seeed_armbian_extension/
          cp scripts/build.sh armbian-build/build.sh
          chmod +x armbian-build/build.sh
          echo "Staged build.sh -> armbian-build/build.sh"
          echo "Copied extension -> armbian-build/userpatches/extensions/seeed_armbian_extension"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-aarch64-linux-gnu \
            bc bison flex libssl-dev libelf-dev \
            python3 device-tree-compiler swig \
            cpio rsync curl wget git \
            dwarves

      - name: Compile kernel (scripts/build.sh --kernel)
        working-directory: armbian-build
        env:
          BOARD: ${{ steps.board.outputs.name }}
        run: |
          ./build.sh --kernel -b "${BOARD}"

      - name: Compile U-Boot (scripts/build.sh --uboot)
        working-directory: armbian-build
        env:
          BOARD: ${{ steps.board.outputs.name }}
        run: |
          ./build.sh --uboot -b "${BOARD}"

      - name: List built debs
        env:
          BOARD: ${{ steps.board.outputs.name }}
        run: |
          echo "=== Built packages for ${BOARD} ==="
          find armbian-build/output/debs -name '*.deb' -exec ls -lh {} \;

      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ steps.board.outputs.name }}
          path: armbian-build/output/debs/**/*.deb

  # ──────────────────────────────────────────────────
  # Publish APT repository (aptly + GitHub Pages).
  # Merges userspace + kernel/U-Boot debs (from the two
  # build jobs above) with prebuilt and SDK debs, then
  # regenerates the entire apt repo + an index HTML page.
  # ──────────────────────────────────────────────────
  publish:
    needs: [build-userspace, build-kernel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4

      - name: Download all debs
        uses: actions/download-artifact@v4
        with:
          path: /tmp/debs
          pattern: debs-*
          merge-multiple: true

      - name: Checkout prebuilt debs
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref || 'deb_source' }}
          sparse-checkout: prebuilt
          path: deb-source

      - name: Merge prebuilt debs
        run: |
          if [[ -d deb-source/prebuilt ]]; then
            copied=$(find deb-source/prebuilt -name '*.deb' | wc -l)
            cp -vn deb-source/prebuilt/*.deb /tmp/debs/ 2>/dev/null || true
            echo "Merged ${copied} prebuilt debs"
          else
            echo "No prebuilt directory found, skipping"
          fi

      - name: Download SDK debs from Release
        env:
          GH_TOKEN: ${{ github.token }}
          SDK_RELEASE_TAG: 'rockchip-sdk-debs'
          REPO: ${{ github.repository }}
        run: |
          echo "=== Downloading SDK debs from Release: ${SDK_RELEASE_TAG} ==="
          TMPDIR=$(mktemp -d)
          gh release download "${SDK_RELEASE_TAG}" \
            --repo "${REPO}" \
            --dir "${TMPDIR}" \
            --pattern '*arm64*.tar.xz' \
            --clobber || { echo "WARNING: Release ${SDK_RELEASE_TAG} not found, skipping SDK debs"; exit 0; }
          echo "Extracting archives..."
          for archive in "${TMPDIR}"/*.tar.xz; do
            echo "  Extracting: $(basename "${archive}")"
            tar -xf "${archive}" -C "${TMPDIR}"
          done
          echo "Downloaded $(find "${TMPDIR}" -name '*.deb' | wc -l) SDK debs"
          EXCLUDE_PKGS=$(find /tmp/debs -name '*.deb' -exec basename {} \; | sed 's/_.*//' | sort -u)
          echo "CI-built packages (will exclude from SDK): ${EXCLUDE_PKGS}"
          # Manifest of SDK-sourced debs — used by generate-deb-index.sh to
          # classify them as "Rockchip SDK" regardless of package name.
          : > /tmp/sdk-debs.manifest
          copied=0; skipped=0; seen_pkgs=""
          while IFS= read -r deb; do
            pkg_name=$(basename "${deb}" | sed 's/_.*//')
            if echo "${EXCLUDE_PKGS}" | grep -qxF "${pkg_name}"; then
              echo "  SKIP (conflicts with CI build): $(basename "${deb}")"
              skipped=$((skipped + 1))
            elif echo "${seen_pkgs}" | grep -qxF "${pkg_name}"; then
              echo "  SKIP (duplicate in SDK): $(basename "${deb}")"
              skipped=$((skipped + 1))
            else
              cp -vn "${deb}" /tmp/debs/ && copied=$((copied + 1))
              basename "${deb}" >> /tmp/sdk-debs.manifest
              seen_pkgs="${seen_pkgs}${pkg_name}"$'\n'
            fi
          done < <(find "${TMPDIR}" -name '*.deb')
          echo "  Copied ${copied} SDK debs, skipped ${skipped} conflicting"
          echo "  Manifest: $(wc -l < /tmp/sdk-debs.manifest) entries in /tmp/sdk-debs.manifest"

      - name: Fix cross-distro dependencies
        run: |
          # Replace libgcc1 with libgcc-s1 (libgcc1 removed in trixie,
          # libgcc-s1 available in bookworm, trixie, noble).
          fixed=0
          for deb in /tmp/debs/*.deb; do
            [ -f "${deb}" ] || continue
            if dpkg-deb -f "${deb}" depends 2>/dev/null | grep -q 'libgcc1'; then
              echo "Fixing deps: $(basename "${deb}")"
              tmpdir=$(mktemp -d)
              dpkg-deb -R "${deb}" "${tmpdir}"
              sed -i 's/libgcc1 (>= 1:4.2)/libgcc-s1/g' "${tmpdir}/DEBIAN/control"
              dpkg-deb -b "${tmpdir}" "${deb}"
              rm -rf "${tmpdir}"
              fixed=$((fixed + 1))
            fi
          done
          echo "Fixed ${fixed} packages"

      - name: List all debs (final)
        run: |
          echo "=== Final .deb list ==="
          find /tmp/debs -name '*.deb' -exec basename {} \; | sort
          echo "Total: $(find /tmp/debs -name '*.deb' | wc -l)"

      - name: Install aptly
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly gnupg2

      - name: Import GPG key
        env:
          GPG_KEY_B64: ${{ secrets.ARMBIAN_APT_GPG_PRIVATE_KEY }}
        run: |
          echo "${GPG_KEY_B64}" | base64 -d | gpg --batch --import

      - name: Publish apt repository
        env:
          ARMBIAN_APT_GPG_KEY_ID: ${{ secrets.ARMBIAN_APT_GPG_KEY_ID }}
        run: |
          chmod +x scripts/*.sh
          scripts/publish-aptly.sh /tmp/debs

      - name: Generate deb index page
        run: |
          scripts/generate-deb-index.sh /tmp/debs public/index.html /tmp/sdk-debs.manifest

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  # ──────────────────────────────────────────────────
  # Deploy to GitHub Pages
  # ──────────────────────────────────────────────────
  deploy-pages:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
