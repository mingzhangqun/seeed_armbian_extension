name: Build and Publish APT Repository

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Source branch/tag for package sources'
        required: false
        default: 'deb_source'
      sdk_debs_release:
        description: 'Release tag containing SDK deb packages (leave empty to skip)'
        required: false
        default: 'rockchip-sdk-debs'
      build_kernel:
        description: 'Trigger kernel build after publish'
        required: false
        type: boolean
        default: false
      armbian_ref:
        description: 'armbian-build ref (passed to kernel workflow if build_kernel=true)'
        required: false
        default: 'main'
      kernel_board:
        description: 'Board for kernel build (if build_kernel is true)'
        required: false
        type: choice
        options:
          - recomputer-rk3576-devkit

  push:
    branches: [deb_source]

jobs:
  # ──────────────────────────────────────────────────
  # 从源码构建的包 — Noble (arm64 runner)
  # ──────────────────────────────────────────────────
  build-debs:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fcs960k-aic-bluez
            source_dir: FCS960K-aic-bluz
            build_deps: >-
              autoconf automake libtool pkg-config
              libglib2.0-dev libdbus-1-dev libreadline-dev
              libncurses-dev libffi-dev zlib1g-dev
              libgettextpo-dev libexpat-dev libudev-dev libical-dev
              libjson-c-dev libelf-dev python3-docutils
            build_cmd: DEB_BUILD_OPTIONS="noddebs" dpkg-buildpackage -us -uc -b

          - name: hostapd-morse-tools
            source_dir: hostapd_morse_tools
            build_deps: libnl-3-dev libnl-genl-3-dev libnl-route-3-dev libssl-dev libdbus-1-dev
            build_cmd: make deb

          - name: morsectrl-tools
            source_dir: morsectrl_tools
            build_deps: quilt libnl-3-dev libnl-genl-3-dev libnl-route-3-dev gcc-aarch64-linux-gnu
            build_cmd: DEB_BUILD_OPTIONS="noddebs" dpkg-buildpackage -us -uc -b

          - name: wpa-supplicant-morse-tools
            source_dir: wpa_supplicant_morese_tools
            build_deps: libnl-3-dev libnl-genl-3-dev libnl-route-3-dev libssl-dev libdbus-1-dev
            build_cmd: make deb

          - name: morse-fgh100m-dkms
            source_dir: morse-fgh100m-dkms
            build_deps: dh-sequence-dkms
            build_cmd: DEB_BUILD_OPTIONS="noddebs" dpkg-buildpackage -us -uc -b

          - name: realtek-r8125-dkms
            source_dir: realtek-r8125-dkms
            build_deps: dh-sequence-dkms
            build_cmd: DEB_BUILD_OPTIONS="noddebs" dpkg-buildpackage -us -uc -b

          - name: usbdevice-gadget
            source_dir: rk35xx_usb_gadget
            build_deps: ''
            build_cmd: bash build-usbdevice-deb.sh

          - name: camera-engine-rkaiq-rk3576
            source_dir: camera_engine_rkaiq
            build_deps: cmake pkg-config libdrm-dev
            build_cmd: bash build-deb.sh rk3576

          - name: camera-engine-rkaiq-rk3588
            source_dir: camera_engine_rkaiq
            build_deps: cmake pkg-config libdrm-dev
            build_cmd: bash build-deb.sh rk3588

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref || 'deb_source' }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential devscripts debhelper \
            dpkg-dev fakeroot ${{ matrix.build_deps }}

      - name: Build ${{ matrix.name }} (Noble)
        working-directory: ${{ matrix.source_dir }}
        run: |
          set -euo pipefail
          ${{ matrix.build_cmd }}
          mkdir -p /tmp/debs
          find .. -maxdepth 1 -name '*.deb' ! -name 'Makefile.deb' -exec cp {} /tmp/debs/ \;
          find . -name '*.deb' ! -name 'Makefile.deb' -exec cp {} /tmp/debs/ \;
          echo "Built packages (Noble):"
          ls -lh /tmp/debs/*.deb

      - name: Upload debs (Noble)
        uses: actions/upload-artifact@v4
        with:
          name: debs-noble-${{ matrix.name }}
          path: /tmp/debs/*.deb

  # ──────────────────────────────────────────────────
  # Bookworm-specific builds (packages with glibc/t64 deps)
  # ──────────────────────────────────────────────────
  build-debs-bookworm:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:bookworm
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fcs960k-aic-bluez
            source_dir: FCS960K-aic-bluz
            build_deps: >-
              autoconf automake libtool pkg-config flex bison
              libglib2.0-dev libdbus-1-dev libreadline-dev
              libncurses-dev libffi-dev zlib1g-dev
              libgettextpo-dev libexpat-dev libudev-dev libical-dev
              libjson-c-dev libelf-dev python3-docutils
            build_cmd: DEB_BUILD_OPTIONS="noddebs" dpkg-buildpackage -us -uc -b

          - name: wpa-supplicant-morse-tools
            source_dir: wpa_supplicant_morese_tools
            build_deps: libnl-3-dev libnl-genl-3-dev libnl-route-3-dev libssl-dev libdbus-1-dev
            build_cmd: make deb

          - name: hostapd-morse-tools
            source_dir: hostapd_morse_tools
            build_deps: libnl-3-dev libnl-genl-3-dev libnl-route-3-dev libssl-dev libdbus-1-dev
            build_cmd: make deb

          - name: morsectrl-tools
            source_dir: morsectrl_tools
            build_deps: quilt pkg-config libnl-3-dev libnl-genl-3-dev libnl-route-3-dev gcc-aarch64-linux-gnu
            build_cmd: DEB_BUILD_OPTIONS="noddebs" dpkg-buildpackage -us -uc -b

          - name: camera-engine-rkaiq-rk3576
            source_dir: camera_engine_rkaiq
            build_deps: cmake pkg-config libdrm-dev vim-common
            build_cmd: DEB_RELEASE=1+bookworm1 bash build-deb.sh rk3576

          - name: camera-engine-rkaiq-rk3588
            source_dir: camera_engine_rkaiq
            build_deps: cmake pkg-config libdrm-dev vim-common
            build_cmd: DEB_RELEASE=1+bookworm1 bash build-deb.sh rk3588

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref || 'deb_source' }}

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential devscripts debhelper \
            dpkg-dev fakeroot ${{ matrix.build_deps }}

      - name: Add Bookworm version suffix
        working-directory: ${{ matrix.source_dir }}
        run: |
          if [ -f debian/changelog ]; then
            DEBEMAIL="ci@seeed.cc" DEBFULLNAME="CI" dch -l +bookworm "Rebuilt for Debian Bookworm"
            echo "Version suffix added:"
            head -1 debian/changelog
          fi

      - name: Fix DRM include path for Bookworm
        if: contains(matrix.source_dir, 'camera_engine_rkaiq')
        run: |
          # Bookworm Docker lacks /usr/include/drm/; link to libdrm headers
          if [ ! -d /usr/include/drm ] && [ -d /usr/include/libdrm ]; then
            ln -s /usr/include/libdrm /usr/include/drm
          fi

      - name: Build ${{ matrix.name }} (Bookworm)
        shell: bash
        working-directory: ${{ matrix.source_dir }}
        run: |
          set -euo pipefail
          ${{ matrix.build_cmd }}
          mkdir -p /tmp/debs
          find .. -maxdepth 1 -name '*.deb' ! -name 'Makefile.deb' -exec cp {} /tmp/debs/ \;
          find . -name '*.deb' ! -name 'Makefile.deb' -exec cp {} /tmp/debs/ \;
          echo "Built packages (Bookworm):"
          ls -lh /tmp/debs/*.deb

      - name: Upload debs (Bookworm)
        uses: actions/upload-artifact@v4
        with:
          name: debs-bookworm-${{ matrix.name }}
          path: /tmp/debs/*.deb

  # ──────────────────────────────────────────────────
  # 使用 aptly 构建 apt 仓库并发布
  # ──────────────────────────────────────────────────
  publish-apt:
    needs: [build-debs, build-debs-bookworm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4

      - name: Download Noble debs
        uses: actions/download-artifact@v4
        with:
          path: /tmp/debs-noble
          pattern: debs-noble-*
          merge-multiple: true

      - name: Download Bookworm debs
        uses: actions/download-artifact@v4
        with:
          path: /tmp/debs-bookworm
          pattern: debs-bookworm-*
          merge-multiple: true

      - name: Checkout prebuilt debs
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref || 'deb_source' }}
          sparse-checkout: prebuilt
          path: deb-source

      - name: Merge prebuilt debs into Noble
        run: |
          if [[ -d deb-source/prebuilt ]]; then
            copied=$(find deb-source/prebuilt -name '*.deb' | wc -l)
            cp -vn deb-source/prebuilt/*.deb /tmp/debs-noble/ 2>/dev/null || true
            echo "Merged ${copied} prebuilt debs into Noble directory"
          else
            echo "No prebuilt directory found, skipping"
          fi

      - name: Download SDK debs from Release
        env:
          GH_TOKEN: ${{ github.token }}
          SDK_RELEASE_TAG: ${{ inputs.sdk_debs_release || 'rockchip-sdk-debs' }}
        run: |
          echo "=== Downloading SDK debs from Release: ${SDK_RELEASE_TAG} ==="
          TMPDIR=$(mktemp -d)
          gh release download "${SDK_RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --dir "${TMPDIR}" \
            --pattern '*.tar.xz' \
            --clobber || { echo "WARNING: Release ${SDK_RELEASE_TAG} not found, skipping SDK debs"; exit 0; }
          echo "Extracting archives..."
          for archive in "${TMPDIR}"/*.tar.xz; do
            echo "  Extracting: $(basename "${archive}")"
            tar -xf "${archive}" -C "${TMPDIR}"
          done
          echo "Downloaded $(find "${TMPDIR}" -name '*.deb' | wc -l) SDK debs"
          # SDK debs go into Noble; distro-agnostic ones are later copied to Bookworm
          EXCLUDE_PKGS=$(find /tmp/debs-noble -name '*.deb' -exec basename {} \; | sed 's/_.*//' | sort -u)
          echo "CI-built packages (will exclude from SDK): ${EXCLUDE_PKGS}"
          copied=0; skipped=0; seen_pkgs=""
          while IFS= read -r deb; do
            pkg_name=$(basename "${deb}" | sed 's/_.*//')
            if echo "${EXCLUDE_PKGS}" | grep -qxF "${pkg_name}"; then
              echo "  SKIP (conflicts with CI build): $(basename "${deb}")"
              skipped=$((skipped + 1))
            elif echo "${seen_pkgs}" | grep -qxF "${pkg_name}"; then
              echo "  SKIP (duplicate in SDK): $(basename "${deb}")"
              skipped=$((skipped + 1))
            else
              cp -vn "${deb}" /tmp/debs-noble/ && copied=$((copied + 1))
              seen_pkgs="${seen_pkgs}${pkg_name}"$'\n'
            fi
          done < <(find "${TMPDIR}" -name '*.deb')
          echo "  Copied ${copied} SDK debs, skipped ${skipped} conflicting"

      - name: Copy distro-agnostic Noble debs to Bookworm
        run: |
          # Packages without Bookworm-specific builds (DKMS, shell scripts, SDK, prebuilt)
          copied=0
          for deb in /tmp/debs-noble/*.deb; do
            [ -f "${deb}" ] || continue
            pkg_name=$(basename "${deb}" | sed 's/_.*//')
            if ! find /tmp/debs-bookworm -name "${pkg_name}_*.deb" -print -quit | grep -q .; then
              cp -vn "${deb}" /tmp/debs-bookworm/ && copied=$((copied + 1))
              echo "  Copied to Bookworm: $(basename "${deb}")"
            fi
          done
          echo "Copied ${copied} distro-agnostic debs from Noble to Bookworm"

      - name: Download cached kernel debs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/kernel-cache
          gh release download kernel-debs-cache \
            --repo "${{ github.repository }}" \
            --dir /tmp/kernel-cache \
            --clobber 2>/dev/null \
            || { echo "No kernel cache found, skipping kernel debs"; exit 0; }
          if [ -f /tmp/kernel-cache/kernel-debs.tar.xz ]; then
            tar -xf /tmp/kernel-cache/kernel-debs.tar.xz -C /tmp/kernel-cache
            echo "=== Cached kernel debs ==="
            find /tmp/kernel-cache -name '*.deb' -exec basename {} \;
            cp -v /tmp/kernel-cache/*.deb /tmp/debs-noble/
            cp -v /tmp/kernel-cache/*.deb /tmp/debs-bookworm/
            echo "Added $(find /tmp/kernel-cache -name '*.deb' | wc -l) cached kernel debs"
          fi

      - name: List all debs (final)
        run: |
          echo "=== Final Noble .deb list ==="
          find /tmp/debs-noble -name '*.deb' -exec basename {} \; | sort
          echo "Total Noble: $(find /tmp/debs-noble -name '*.deb' | wc -l)"
          echo "=== Final Bookworm .deb list ==="
          find /tmp/debs-bookworm -name '*.deb' -exec basename {} \; | sort
          echo "Total Bookworm: $(find /tmp/debs-bookworm -name '*.deb' | wc -l)"

      - name: Install aptly
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly gnupg2

      - name: Import GPG key
        run: |
          echo "${{ secrets.ARMBIAN_APT_GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Publish apt repository
        run: |
          chmod +x scripts/*.sh
          scripts/publish-aptly.sh /tmp/debs-noble /tmp/debs-bookworm
        env:
          ARMBIAN_APT_GPG_KEY_ID: ${{ secrets.ARMBIAN_APT_GPG_KEY_ID }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Cache userspace debs for kernel workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/cache-out
          # Noble: exclude kernel debs
          mkdir -p /tmp/cache-out/noble
          find /tmp/debs-noble -name '*.deb' ! -name 'linux-image-*' ! -name 'linux-headers-*' ! -name 'linux-dtb-*' ! -name 'linux-source-*' \
            -exec cp {} /tmp/cache-out/noble/ \;
          cd /tmp/cache-out/noble && shopt -s nullglob; deb_files=(*.deb); if [ ${#deb_files[@]} -gt 0 ]; then tar -cf ../noble-debs.tar.xz -I 'xz -9' "${deb_files[@]}"; fi
          # Bookworm: exclude kernel debs
          mkdir -p /tmp/cache-out/bookworm
          find /tmp/debs-bookworm -name '*.deb' ! -name 'linux-image-*' ! -name 'linux-headers-*' ! -name 'linux-dtb-*' ! -name 'linux-source-*' \
            -exec cp {} /tmp/cache-out/bookworm/ \;
          cd /tmp/cache-out/bookworm && shopt -s nullglob; deb_files=(*.deb); if [ ${#deb_files[@]} -gt 0 ]; then tar -cf ../bookworm-debs.tar.xz -I 'xz -9' "${deb_files[@]}"; fi
          # Upload to Release
          cd /tmp/cache-out
          gh release create userspace-debs-cache noble-debs.tar.xz bookworm-debs.tar.xz \
            --repo "${{ github.repository }}" \
            --title "Userspace debs cache" \
            --notes "Latest userspace debs (auto-updated by CI)" \
          || gh release upload userspace-debs-cache noble-debs.tar.xz bookworm-debs.tar.xz \
            --repo "${{ github.repository }}" \
            --clobber

  # ──────────────────────────────────────────────────
  # 部署到 GitHub Pages
  # ──────────────────────────────────────────────────
  deploy-pages:
    needs: publish-apt
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ──────────────────────────────────────────────────
  # Optionally trigger kernel build after deploy
  # ──────────────────────────────────────────────────
  kernel:
    needs: deploy-pages
    if: ${{ inputs.build_kernel == true }}
    uses: ./.github/workflows/kernel-build-publish.yml
    with:
      board: ${{ inputs.kernel_board || 'recomputer-rk3576-devkit' }}
      armbian_ref: ${{ inputs.armbian_ref || 'main' }}
    secrets: inherit
