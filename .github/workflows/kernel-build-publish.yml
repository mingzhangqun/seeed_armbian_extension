name: Build and Publish Kernel

on:
  workflow_dispatch:
    inputs:
      build_rk3576:
        description: 'recomputer-rk3576-devkit'
        required: false
        type: boolean
        default: true
      build_rk3588:
        description: 'recomputer-rk3588-devkit'
        required: false
        type: boolean
        default: true

# ──────────────────────────────────────────────────
# Kernel + U-Boot build via scripts/build.sh (wraps
# armbian-build's compile.sh, sets ENABLE_SEEED_RK_EXTENSION,
# RK_COMPILE_USBPLUG, cache invalidation, etc.)
# Output: armbian-build/output/debs/*.deb
# ──────────────────────────────────────────────────

jobs:
  # ──────────────────────────────────────────────────
  # Build a JSON matrix of boards from the input flags.
  # ──────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      armbian_ref: ${{ steps.gen.outputs.armbian_ref }}
    steps:
      - name: Generate matrix
        id: gen
        env:
          INPUT_RK3576: ${{ inputs.build_rk3576 }}
          INPUT_RK3588: ${{ inputs.build_rk3588 }}
        run: |
          set -eu
          boards=()
          [[ "${INPUT_RK3576}" == 'true' ]] && boards+=('recomputer-rk3576-devkit')
          [[ "${INPUT_RK3588}" == 'true' ]] && boards+=('recomputer-rk3588-devkit')
          if [ ${#boards[@]} -eq 0 ]; then
            echo "::error::No boards selected (enable build_rk3576 or build_rk3588)."
            exit 1
          fi
          # Reject anything that isn't a valid board slug — guards against
          # shell injection when the value is later interpolated into run:.
          for b in "${boards[@]}"; do
            if [[ ! "$b" =~ ^[a-zA-Z0-9][a-zA-Z0-9._-]*$ ]]; then
              echo "::error::Invalid board name: '$b'"
              exit 1
            fi
          done
          # Emit JSON array of {board: "..."} objects for the matrix.
          # -c keeps it single-line so $GITHUB_OUTPUT parsing doesn't break
          # on indented continuation lines.
          matrix=$(printf '%s\n' "${boards[@]}" | jq -Rc '{board: .}' | jq -sc '.')
          # Use heredoc format to be safe even if the value spans lines.
          {
            echo "matrix<<EOF"
            echo "${matrix}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          # armbian-build ref follows the workflow's own ref ("Use workflow
          # from" in the dispatch UI). Feature branches of this repo don't
          # exist in Seeed-Studio/armbian-build, so fall back to main.
          REF_NAME="${GITHUB_REF_NAME}"
          LSREMOTE=$(git ls-remote "https://github.com/Seeed-Studio/armbian-build.git" "${REF_NAME}" 2>/dev/null || true)
          if [[ -n "${LSREMOTE}" ]]; then
            RESOLVED="${REF_NAME}"
          else
            RESOLVED="main"
            echo "::warning::Ref '${REF_NAME}' not found in Seeed-Studio/armbian-build, using 'main'."
          fi
          echo "armbian_ref=${RESOLVED}" >> "$GITHUB_OUTPUT"
          echo "Selected boards: ${boards[*]}"

  # ──────────────────────────────────────────────────
  # Per-board matrix build: kernel + (optional) U-Boot
  # ──────────────────────────────────────────────────
  build:
    needs: prepare
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        value: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout (for scripts/build.sh and extension)
        uses: actions/checkout@v4

      - name: Resolve board
        id: board
        env:
          MATRIX_BOARD: ${{ matrix.value.board }}
        run: |
          echo "name=${MATRIX_BOARD}" >> "$GITHUB_OUTPUT"
          echo "Resolved board: ${MATRIX_BOARD}"

      - name: Checkout armbian-build
        uses: actions/checkout@v4
        with:
          repository: Seeed-Studio/armbian-build
          ref: ${{ needs.prepare.outputs.armbian_ref }}
          path: armbian-build
          fetch-depth: 1

      - name: Link extension and stage build.sh
        # scripts/build.sh expects to sit next to compile.sh (it does
        # `cd "$SCRIPT_DIR"; [[ -f compile.sh ]]`). Stage it at
        # armbian-build/build.sh so SCRIPT_DIR resolves to armbian-build.
        # Also symlink this repo into userpatches/extensions/ so the
        # ENABLE_SEEED_RK_EXTENSION flag in build.sh actually finds it.
        run: |
          EXT_DIR="$PWD"
          mkdir -p armbian-build/userpatches/extensions
          ln -sfn "$EXT_DIR" armbian-build/userpatches/extensions/seeed_armbian_extension
          cp scripts/build.sh armbian-build/build.sh
          chmod +x armbian-build/build.sh
          echo "Staged build.sh -> armbian-build/build.sh"
          echo "Linked extension -> armbian-build/userpatches/extensions/seeed_armbian_extension"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-aarch64-linux-gnu \
            bc bison flex libssl-dev libelf-dev \
            python3 device-tree-compiler swig \
            cpio rsync curl wget git \
            dwarves

      - name: Compile kernel (scripts/build.sh --kernel)
        working-directory: armbian-build
        env:
          BOARD: ${{ steps.board.outputs.name }}
        run: |
          ./build.sh --kernel -b "${BOARD}"

      - name: Compile U-Boot (scripts/build.sh --uboot)
        working-directory: armbian-build
        env:
          BOARD: ${{ steps.board.outputs.name }}
        run: |
          ./build.sh --uboot -b "${BOARD}"

      - name: List built debs
        env:
          BOARD: ${{ steps.board.outputs.name }}
        run: |
          echo "=== Built packages for ${BOARD} ==="
          find armbian-build/output/debs -name '*.deb' -exec ls -lh {} \;

      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ steps.board.outputs.name }}
          path: armbian-build/output/debs/**/*.deb

  # ──────────────────────────────────────────────────
  # Incremental publish: replaces kernel + U-Boot debs,
  # downloads cached userspace debs from Release, then
  # regenerates the entire apt repo + an index HTML page.
  # ──────────────────────────────────────────────────
  publish-kernel:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built debs
        uses: actions/download-artifact@v4
        with:
          path: /tmp/built-debs
          pattern: debs-*
          merge-multiple: true

      - name: Download cached userspace debs (required)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p /tmp/cache /tmp/userspace
          if ! gh release download userspace-debs-cache \
              --repo "${REPO}" \
              --dir /tmp/cache \
              --clobber 2>/dev/null; then
            echo "::error::userspace-debs-cache Release not found. Run the main build workflow first to create it."
            exit 1
          fi

          if [ -f /tmp/cache/userspace-debs.tar.xz ]; then
            tar -xf /tmp/cache/userspace-debs.tar.xz -C /tmp/userspace
            echo "Restored $(find /tmp/userspace -name '*.deb' | wc -l) userspace debs"
          fi

      - name: Remove old kernel + U-Boot debs from cache
        run: |
          find /tmp/userspace -type f \( \
            -name 'linux-image-*' \
            -o -name 'linux-headers-*' \
            -o -name 'linux-dtb-*' \
            -o -name 'linux-source-*' \
            -o -name 'linux-u-boot-*' \
          \) -print -delete

      - name: Add new kernel + U-Boot debs
        run: |
          cp -v /tmp/built-debs/*.deb /tmp/userspace/
          echo "=== Final debs ==="
          find /tmp/userspace -name '*.deb' | sort

      - name: Install aptly
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly gnupg2

      - name: Import GPG key
        env:
          GPG_KEY_B64: ${{ secrets.ARMBIAN_APT_GPG_PRIVATE_KEY }}
        run: |
          echo "${GPG_KEY_B64}" | base64 -d | gpg --batch --import

      - name: Publish apt repository
        env:
          ARMBIAN_APT_GPG_KEY_ID: ${{ secrets.ARMBIAN_APT_GPG_KEY_ID }}
        run: |
          chmod +x scripts/*.sh
          scripts/publish-aptly.sh /tmp/userspace

      - name: Generate deb index page
        run: |
          # userspace-debs-cache tar includes sdk-debs.manifest (if produced
          # by build-and-publish.yml) so SDK debs can be classified correctly.
          scripts/generate-deb-index.sh /tmp/userspace public/index.html /tmp/userspace/sdk-debs.manifest

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Update kernel + U-Boot debs cache
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          TMPDIR=$(mktemp -d)
          cp /tmp/built-debs/*.deb "${TMPDIR}/"
          cd "${TMPDIR}"
          tar -cf kernel-debs.tar.xz -I 'xz -9' *.deb
          gh release create kernel-debs-cache kernel-debs.tar.xz \
            --repo "${REPO}" \
            --title "Kernel + U-Boot debs cache" \
            --notes "Latest kernel + U-Boot debs (auto-updated by CI)" \
          || gh release upload kernel-debs-cache kernel-debs.tar.xz \
            --repo "${REPO}" \
            --clobber

  # ──────────────────────────────────────────────────
  # Deploy to GitHub Pages
  # ──────────────────────────────────────────────────
  deploy-pages:
    needs: publish-kernel
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
